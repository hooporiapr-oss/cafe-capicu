<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="PLAY PA'LANTE — Café Pa’Lante Collections Word Search Experience.">
  <title>PLAY PA'LANTE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --serif:'DM Serif Display',serif;
      --sans:'Instrument Sans',sans-serif;
      --display:'Bebas Neue',sans-serif;

      --night:#0B0B14;
      --surface:#1A1726;
      --surface2:#211D2E;

      --gold:#D4A843;
      --coffee:#8B5E3C;
      --cream:#EDEBE8;
      --green:#2DD4A8;
      --purple:#8B5CF6;

      --text:#EDEBE8;
      --muted:rgba(237,235,232,.55);

      --radius:18px;
    }

    body{
      font-family:var(--sans);
      background:var(--night);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }

    .bg{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
    }

    .bg::before{
      content:'';
      position:absolute;
      top:-10%;
      left:50%;
      transform:translateX(-50%);
      width:700px;
      height:700px;
      border-radius:50%;
      background:radial-gradient(circle,rgba(212,168,67,.10) 0%,transparent 60%);
    }

    .wrap{
      max-width:480px;
      margin:0 auto;
      padding:0 16px;
      position:relative;
      z-index:1;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:12px;
      padding:16px 0;
    }

    .nav-back{
      width:40px;
      height:40px;
      border-radius:12px;
      background:var(--surface);
      border:1px solid rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:var(--text);
      font-size:18px;
    }

    .nav-title{
      font-family:var(--display);
      letter-spacing:3px;
      font-size:16px;
      color:var(--muted);
    }

    .hero{
      text-align:center;
      padding:8px 0 24px;
    }

    .hero-icon{
      font-size:42px;
      display:block;
      margin-bottom:10px;
    }

    .hero h1{
      font-family:var(--serif);
      font-size:34px;
      font-weight:400;
      margin-bottom:6px;
    }

    .hero h1 em{
      font-style:italic;
      background:linear-gradient(135deg,var(--gold),#f3d27a);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero-sub{
      font-size:13px;
      color:var(--muted);
      font-weight:500;
    }

    .stats{
      display:flex;
      justify-content:center;
      gap:24px;
      padding:10px 0 22px;
    }

    .stat{
      text-align:center;
    }

    .stat-val{
      font-family:var(--display);
      font-size:28px;
      letter-spacing:1px;
    }

    .stat-lb{
      font-size:10px;
      letter-spacing:1.5px;
      color:var(--muted);
      text-transform:uppercase;
      margin-top:2px;
    }

    .cats{
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding-bottom:16px;
      scrollbar-width:none;
    }

    .cats::-webkit-scrollbar{
      display:none;
    }

    .cat{
      flex-shrink:0;
      padding:10px 16px;
      border-radius:100px;
      border:1.5px solid rgba(255,255,255,.08);
      background:var(--surface);
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .cat.on{
      background:rgba(212,168,67,.14);
      border-color:rgba(212,168,67,.35);
      color:var(--gold);
    }

    .grid-wrap{
      background:var(--surface);
      border-radius:var(--radius);
      border:1.5px solid rgba(255,255,255,.05);
      padding:14px;
      margin-bottom:14px;
    }

    .grid{
      display:grid;
      gap:3px;
    }

    .cell{
      aspect-ratio:1;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--surface2);
      border-radius:6px;
      font-family:var(--display);
      font-size:clamp(15px,4.2vw,20px);
      letter-spacing:1px;
      cursor:pointer;
      transition:.12s;
    }

    .cell.sel{
      background:var(--purple);
      transform:scale(1.1);
      color:white;
    }

    .cell.f0{background:#D4A843;color:#0B0B14}
    .cell.f1{background:#8B5CF6;color:white}
    .cell.f2{background:#2DD4A8;color:#0B0B14}
    .cell.f3{background:#F97316;color:white}
    .cell.f4{background:#3B82F6;color:white}
    .cell.f5{background:#EC4899;color:white}

    .words{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      justify-content:center;
      margin-bottom:14px;
    }

    .word{
      padding:5px 12px;
      border-radius:100px;
      background:var(--surface);
      border:1.5px solid rgba(255,255,255,.06);
      color:var(--muted);
      font-size:12px;
      font-weight:700;
    }

    .word.found{
      background:var(--gold);
      color:#0B0B14;
      text-decoration:line-through;
      border-color:var(--gold);
    }

    .done-msg{
      display:none;
      text-align:center;
      padding:16px;
      font-family:var(--serif);
      font-size:20px;
      color:var(--gold);
    }

    .actions{
      display:flex;
      gap:8px;
      justify-content:center;
      margin-bottom:32px;
    }

    .act{
      padding:12px 20px;
      border:none;
      border-radius:14px;
      font-size:13px;
      font-weight:700;
      min-height:46px;
    }

    .act-new{
      background:linear-gradient(135deg,var(--gold),#f0c75e);
      color:#0B0B14;
    }

    .act-hint{
      background:var(--surface);
      border:1.5px solid rgba(212,168,67,.15);
      color:var(--gold);
    }

    .act-clear{
      background:var(--surface);
      border:1.5px solid rgba(255,255,255,.06);
      color:var(--muted);
    }

    .footer-brand{
      text-align:center;
      padding:0 0 40px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:1px;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">

  <nav class="nav">
    <a href="../index.html" class="nav-back">←</a>
    <span class="nav-title">CAFÉ PA'LANTE</span>
  </nav>

  <section class="hero">
    <span class="hero-icon">☕</span>

    <h1>
      PLAY <em>PA'LANTE</em>
    </h1>

    <p class="hero-sub">
      Pa’Lante Collections · Play Cognitivo
    </p>
  </section>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="sFound">0</div>
      <div class="stat-lb">Found</div>
    </div>

    <div class="stat">
      <div class="stat-val" id="sTotal">0</div>
      <div class="stat-lb">Total</div>
    </div>

    <div class="stat">
      <div class="stat-val" id="sTime">0:00</div>
      <div class="stat-lb">Time</div>
    </div>
  </div>

  <div class="cats">

    <button class="cat on" onclick="pickCat('signature',this)">
      🏆 Signature
    </button>

    <button class="cat" onclick="pickCat('flavored',this)">
      ☕ Flavored
    </button>

    <button class="cat" onclick="pickCat('singleorigins',this)">
      🌎 Origins
    </button>

    <button class="cat" onclick="pickCat('samplepacks',this)">
      🎁 Packs
    </button>

  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="words" id="wordList"></div>

  <div class="done-msg" id="doneMsg">
    🎉 Pa’Lante Complete!
  </div>

  <div class="actions">

    <button class="act act-clear" onclick="clearSel()">
      ✕ Clear
    </button>

    <button class="act act-hint" onclick="hint()">
      💡 Hint
    </button>

    <button class="act act-new" onclick="newGame()">
      🔄 New
    </button>

  </div>

  <div class="footer-brand">
    PLAY PA'LANTE · CAFÉ PA'LANTE
  </div>

</div>

<script>

var WORDS={

signature:[
'MOMENTUM',
'DISCIPLINA',
'FOCUS',
'POWER',
'VICTORY',
'PALANTE',
'ENERGY',
'GRIND',
'STRONG',
'DRIVE',
'ELEVATE',
'FORWARD',
'RESILIENCE',
'PRIDE',
'DEDICATION'
],

flavored:[
'MOCHA',
'VANILLA',
'CARAMEL',
'HAZELNUT',
'SMORES',
'PECAN',
'MINT',
'CINNAMON',
'CHOCOLATE',
'PUMPKIN',
'SWEET',
'SMOOTH',
'BOLD',
'AROMA',
'FLAVOR'
],

singleorigins:[
'COLOMBIA',
'ETHIOPIA',
'BRAZIL',
'GUATEMALA',
'KENYA',
'ROAST',
'ORIGIN',
'ALTITUDE',
'ARABICA',
'BEANS',
'MOUNTAIN',
'VOLCANIC',
'HARVEST',
'CRAFT',
'PREMIUM'
],

samplepacks:[
'DISCOVER',
'EXPLORE',
'SELECTION',
'VARIETY',
'TASTE',
'COLLECTION',
'FAVORITES',
'JOURNEY',
'EXPERIENCE',
'ROAST',
'FLAVOR',
'COFFEE',
'TRY',
'BLEND',
'PALANTE'
]

};

var SIZE=10,
COLORS=['f0','f1','f2','f3','f4','f5'];

var cat='signature',
grid=[],
placed=[],
wordList=[],
found=[],
selected=[],
colorIdx=0;

var timer=null,
seconds=0;

function pickCat(c,btn){

cat=c;

var btns=document.querySelectorAll('.cat');

for(var i=0;i<btns.length;i++){
btns[i].classList.remove('on');
}

btn.classList.add('on');

newGame();

}

function newGame(){

found=[];
selected=[];
placed=[];
wordList=[];
grid=[];
colorIdx=0;

document.getElementById('doneMsg').style.display='none';

for(var r=0;r<SIZE;r++){
grid[r]=[];
for(var c=0;c<SIZE;c++){
grid[r][c]='';
}
}

var pool=WORDS[cat];
var shuffled=pool.slice().sort(function(){
return Math.random()-.5;
});

var dirs=[[0,1],[1,0],[1,1],[0,-1],[1,-1]];

for(var wi=0;wi<shuffled.length;wi++){

if(wordList.length>=8)break;

var w=shuffled[wi];

if(w.length>SIZE)continue;

var ok=false;

for(var att=0;att<80&&!ok;att++){

var d=dirs[Math.floor(Math.random()*dirs.length)];

var maxR=SIZE-(d[0]>0?w.length:0),
maxC=SIZE-(d[1]>0?w.length:0);

var minR=d[0]<0?w.length-1:0,
minC=d[1]<0?w.length-1:0;

if(maxR<=minR||maxC<=minC)continue;

var sr=minR+Math.floor(Math.random()*(maxR-minR));
var sc=minC+Math.floor(Math.random()*(maxC-minC));

var cells=[],
valid=true;

for(var i=0;i<w.length;i++){

var nr=sr+i*d[0],
nc=sc+i*d[1];

if(nr<0||nr>=SIZE||nc<0||nc>=SIZE){
valid=false;
break;
}

if(grid[nr][nc]!==''&&grid[nr][nc]!==w[i]){
valid=false;
break;
}

cells.push([nr,nc]);

}

if(valid){

for(var i=0;i<w.length;i++){
grid[cells[i][0]][cells[i][1]]=w[i];
}

placed.push({
word:w,
cells:cells
});

wordList.push(w);

ok=true;

}

}

}

var letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ';

for(var r=0;r<SIZE;r++){
for(var c=0;c<SIZE;c++){

if(grid[r][c]===''){
grid[r][c]=letters[Math.floor(Math.random()*letters.length)];
}

}
}

renderGrid();
renderWords();

document.getElementById('sTotal').textContent=wordList.length;
document.getElementById('sFound').textContent='0';

startTimer();

}

function renderGrid(){

var el=document.getElementById('grid');

el.style.gridTemplateColumns='repeat('+SIZE+',1fr)';

var html='';

for(var r=0;r<SIZE;r++){

for(var c=0;c<SIZE;c++){

html+='<div class="cell" data-r="'+r+'" data-c="'+c+'" onclick="tap(this)">'+grid[r][c]+'</div>';

}

}

el.innerHTML=html;

}

function tap(cell){

var r=parseInt(cell.getAttribute('data-r'));
var c=parseInt(cell.getAttribute('data-c'));

selected.push({r:r,c:c});

cell.classList.add('sel');

var word='';

for(var i=0;i<selected.length;i++){
word+=grid[selected[i].r][selected[i].c];
}

var rev=word.split('').reverse().join('');

for(var i=0;i<placed.length;i++){

if(found.indexOf(placed[i].word)>=0)continue;

if(placed[i].word===word||placed[i].word===rev){

var cc=COLORS[colorIdx%COLORS.length];

colorIdx++;

found.push(placed[i].word);

for(var pi=0;pi<placed[i].cells.length;pi++){

var pos=placed[i].cells[pi];

var cl=document.querySelector(
'.cell[data-r="'+pos[0]+'"][data-c="'+pos[1]+'"]'
);

cl.className='cell '+cc;

}

selected=[];

renderWords();

document.getElementById('sFound').textContent=found.length;

if(found.length===wordList.length){

document.getElementById('doneMsg').style.display='block';

clearInterval(timer);

}

return;

}

}

}

function clearSel(){

selected=[];

var cells=document.querySelectorAll('.cell.sel');

for(var i=0;i<cells.length;i++){
cells[i].classList.remove('sel');
}

}

function renderWords(){

var el=document.getElementById('wordList');

var html='';

for(var i=0;i<wordList.length;i++){

var w=wordList[i];

var done=found.indexOf(w)>=0;

html+='<span class="word'+(done?' found':'')+'">'+w+'</span>';

}

el.innerHTML=html;

}

function hint(){

var remain=[];

for(var i=0;i<placed.length;i++){

if(found.indexOf(placed[i].word)<0){
remain.push(placed[i]);
}

}

if(!remain.length)return;

var h=remain[Math.floor(Math.random()*remain.length)];

var pos=h.cells[0];

var cell=document.querySelector(
'.cell[data-r="'+pos[0]+'"][data-c="'+pos[1]+'"]'
);

cell.style.background='#F0C75E';
cell.style.color='#0B0B14';

setTimeout(function(){

cell.style.background='';
cell.style.color='';

},1500);

}

function startTimer(){

if(timer)clearInterval(timer);

seconds=0;

document.getElementById('sTime').textContent='0:00';

timer=setInterval(function(){

seconds++;

var m=Math.floor(seconds/60);
var s=seconds%60;

document.getElementById('sTime').textContent=
m+':' + (s<10?'0'+s:s);

},1000);

}

newGame();

</script>

</body>
</html>
