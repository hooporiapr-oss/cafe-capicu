<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Café Capicú | Dominoes Digital</title>

  <style>
    :root {
      --bg: #E7D2BB;
      --dark: #2B160D;
      --gold: #B8873A;
      --cream: #F6EEE4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: var(--bg);
      font-family: Georgia, "Times New Roman", serif;
      padding: 0;
    }

    .container {
      width: 100%;
      max-width: 100%;
      min-height: 100vh;
      text-align: center;
    }

    .logo-wrap {
      width: 100%;
      padding: 28px 20px 10px;
      margin-bottom: 24px;
    }

    .logo-wrap img {
      width: 100%;
      max-width: 420px;
      height: auto;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 18px 40px rgba(43,22,13,0.18));
    }

    .hero-image {
      width: 100%;
      margin-bottom: 36px;
      border-radius: 0;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(43,22,13,0.22);
    }

    .hero-image img {
      width: 100%;
      display: block;
      height: auto;
    }

    .button-grid {
      width: min(1100px, calc(100% - 40px));
      margin: 0 auto 50px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

</html>
