```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Café Capicú | Dominoes Digital</title>

  <style>
    :root {
      --bg: #E7D2BB;
      --dark: #2B160D;
      --gold: #B8873A;
      --cream: #F6EEE4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: Georgia, "Times New Roman", serif;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 40px;
    }

    .logo-wrap img {
      width: 100%;
      max-width: 620px;
      height: auto;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 18px 40px rgba(43,22,13,0.18));
    }

    .hero-image {
      margin-bottom: 36px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(43,22,13,0.22);
    }

    .hero-image img {
      width: 100%;
      display: block;
      height: auto;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .play-btn {
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--dark), #5A341F);
      color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.95rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: 0.22s ease;
      box-shadow: 0 12px 30px rgba(43,22,13,0.20);
    }

    .play-btn:hover {
      transform: translateY(-4px);
      background: linear-gradient(135deg, #3B1F13, #704329);
    }

    @media (max-width: 640px) {
      .button-grid {
        grid-template-columns: 1fr;
      }

      .play-btn {
        height: 68px;
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>

  <main class="container">

    <div class="logo-wrap">
      <img src="CAPICU-LOGO.png" alt="Café Capicú Logo" />
    </div>

    <div class="hero-image">
      <img src="Dominoes-Digital.png" alt="Dominoes Digital Café Capicú" />
    </div>

    <div class="button-grid">

      <a class="play-btn" href="https://dominoes.digital/doms/dom-01.html">
        Play Dominoes 01
      </a>

      <a class="play-btn" href="https://dominoes.digital/doms/dom-02.html">
        Play Dominoes 02
      </a>

      <a class="play-btn" href="https://dominoes.digital/doms/dom-03.html">
        Play Dominoes 03
      </a>

      <a class="play-btn" href="https://dominoes.digital/doms/dom-04.html">
        Play Dominoes 04
      </a>

    </div>

  </main>

</body>
</html>
