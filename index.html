```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Café Capicú | Dominoes Digital</title>

  <style>
    :root {
      --bg: #E7D2BB;
      --dark: #2B160D;
      --brown: #5A341F;
      --gold: #B8873A;
      --cream: #F6EEE4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      font-family: Georgia, "Times New Roman", serif;
      color: var(--dark);
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
    }

    .page {
      width: 100%;
      min-height: 100vh;
    }

    .logo-bar {
      width: 100%;
      padding: 28px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-bar img {
      width: 100%;
      max-width: 360px;
      height: auto;
      filter: drop-shadow(0 10px 30px rgba(43,22,13,0.18));
      transition: 0.22s ease;
    }

    .logo-bar img:hover {
      transform: translateY(-2px);
    }

    .hero-image {
      width: 100%;
    }

    .hero-image img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .buttons-wrap {
      width: min(1100px, calc(100% - 40px));
      margin: 40px auto 60px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .play-btn {
      min-height: 76px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--dark), var(--brown));
      color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 14px 34px rgba(43,22,13,0.20);
      transition: 0.22s ease;
    }

    .play-btn:hover {
      transform: translateY(-4px);
      background: linear-gradient(135deg, #3B1F13, #704329);
    }

    @media (max-width: 980px) {
      .button-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .logo-bar {
        padding: 20px 16px;
      }

      .logo-bar img {
        max-width: 280px;
      }

      .buttons-wrap {
        width: calc(100% - 24px);
        margin: 24px auto 40px;
      }

      .button-grid {
        grid-template-columns: 1fr;
      }

      .play-btn {
        min-height: 68px;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>

  <main class="page">

    <div class="logo-bar">
      <a href="https://cafecapicu.com" target="_blank" rel="noopener">
        <img src="CAPICU-LOGO.png" alt="Café Capicú Logo" />
      </a>
    </div>

    <section class="hero-image">
      <img src="Dominoes-Digital.png" alt="Dominoes Digital" />
    </section>

    <section class="buttons-wrap">

      <div class="button-grid">

        <a class="play-btn" href="https://dominoes.digital/doms/dom-01.html">
          Dominoes Digital 01
        </a>

        <a class="play-btn" href="https://dominoes.digital/doms/dom-02.html">
          Dominoes Digital 02
        </a>

        <a class="play-btn" href="https://dominoes.digital/doms/dom-03.html">
          Dominoes Digital 03
        </a>

        <a class="play-btn" href="https://dominoes.digital/doms/dom-04.html">
          Dominoes Digital 04
        </a>

      </div>

    </section>

  </main>

</body>
</html>
```
