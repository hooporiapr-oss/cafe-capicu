<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Play Pa'Lante Domino Recall</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
--gold:#d4a437;
--black:#050505;
--card:#101010;
--white:#fff;
--orange:#ff8c00;
--green:#00d084;
--red:#ff3860;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Outfit',sans-serif;
background:#000;
color:#fff;
overflow:hidden;
}

.topbar{
height:70px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(90deg,#000,#111,#000);
border-bottom:1px solid rgba(212,164,55,.25);
font-family:'Bebas Neue',sans-serif;
letter-spacing:4px;
font-size:2rem;
color:var(--gold);
}

.game-wrap{
width:100%;
min-height:calc(100vh - 70px);
display:flex;
flex-direction:column;
align-items:center;
padding:16px;
}

.stats{
display:flex;
gap:18px;
margin-bottom:12px;
}

.stat{
text-align:center;
}

.stat-value{
font-family:'Bebas Neue',sans-serif;
font-size:1.8rem;
color:var(--gold);
}

.stat-label{
font-size:.65rem;
letter-spacing:1px;
opacity:.7;
}

.message{
font-family:'Bebas Neue',sans-serif;
letter-spacing:3px;
font-size:1.2rem;
</html>
